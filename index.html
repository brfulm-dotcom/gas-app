<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gas Price Converter</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --primary-green: #4caf50;
            --text-color: #ffffff;
            --toggle-bg: #333;
            --muted: #888;
            --input-bg: #2c2c2c;
            --border: #444;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 1rem;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 20px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h2 {
            margin: 0 0 1.25rem;
            font-size: 1.1rem;
            font-weight: 600;
            text-align: center;
            color: var(--text-color);
        }

        .toggle-container {
            display: flex;
            background: var(--toggle-bg);
            border-radius: 10px;
            margin-bottom: 1.25rem;
            padding: 5px;
            gap: 4px;
        }

        .toggle-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: none;
            color: var(--muted);
            cursor: pointer;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.85rem;
            transition: 0.2s;
        }

        .toggle-btn.active {
            background: var(--primary-green);
            color: white;
        }

        .input-group {
            text-align: left;
            margin-bottom: 1.1rem;
        }

        label {
            display: block;
            font-size: 0.72rem;
            margin-bottom: 5px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .field-row {
            display: flex;
            gap: 8px;
        }

        input, select {
            padding: 12px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
        }

        .field-row input {
            flex: 1;
            min-width: 0;
        }

        .field-row select {
            width: 130px;
            flex-shrink: 0;
        }

        select {
            width: 100%;
        }

        .result-card {
            background: rgba(76, 175, 80, 0.1);
            padding: 1.5rem;
            border-radius: 15px;
            border: 1px solid var(--primary-green);
            margin-top: 0.5rem;
            text-align: center;
        }

        #resultValue {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--primary-green);
            display: block;
            margin: 4px 0;
        }

        .sub-text {
            font-size: 0.78rem;
            color: var(--muted);
        }

        #rateInfo {
            font-size: 0.68rem;
            color: #555;
            margin-top: 14px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Gas Price Converter</h2>

    <div class="toggle-container">
        <button id="btn-foreign" class="toggle-btn active" onclick="setMode('foreign')">Foreign → USD</button>
        <button id="btn-us" class="toggle-btn" onclick="setMode('us')">USD → Foreign</button>
    </div>

    <div class="input-group">
        <label id="inputLabel">Price in foreign currency</label>
        <div class="field-row">
            <input type="number" id="inputVal" placeholder="0.00" oninput="calc()" min="0" step="0.01">
            <select id="inputUnit" onchange="calc()">
                <option value="liter">per liter</option>
                <option value="gallon">per gallon</option>
            </select>
        </div>
    </div>

    <div class="input-group">
        <label>Currency</label>
        <select id="currencySelect" onchange="updateRate()"></select>
    </div>

    <div class="input-group">
        <label id="outputUnitLabel">Show USD result in</label>
        <select id="outputUnit" onchange="calc()">
            <option value="gallon">per gallon</option>
            <option value="liter">per liter</option>
        </select>
    </div>

    <div class="result-card">
        <span class="sub-text" id="resultLabel">ESTIMATED USD PRICE</span>
        <span id="resultValue">—</span>
        <span class="sub-text" id="resultUnit">per US Gallon</span>
    </div>

    <p id="rateInfo">Using built-in rates</p>
</div>

<script>
    const FALLBACK_RATES = {
        AUD:1.53, BRL:5.05, CAD:1.36, CHF:0.90, CLP:945, CNY:7.24, COP:3900,
        CZK:23.2, DKK:6.90, EGP:30.9, EUR:0.92, GBP:0.79, HKD:7.82, HUF:362,
        IDR:15700, ILS:3.70, INR:83.1, JPY:149, KRW:1320, MXN:17.2, MYR:4.70,
        NOK:10.6, NZD:1.63, PEN:3.72, PHP:56.5, PLN:4.02, RON:4.59, SEK:10.5,
        SGD:1.34, THB:35.1, TRY:32.1, TWD:31.8, UAH:38.5, VND:24300, ZAR:18.7
    };

    let rates = { ...FALLBACK_RATES };
    let mode = 'foreign';
    const LPG = 3.78541;
    let liveRates = false;

    function populateSelect() {
        const sel = document.getElementById('currencySelect');
        sel.innerHTML = '';
        Object.keys(rates).sort().forEach(c => {
            if (c === 'USD') return;
            const o = document.createElement('option');
            o.value = c;
            o.text = c;
            if (c === 'MXN') o.selected = true;
            sel.appendChild(o);
        });
        updateRate();
    }

    async function tryLiveRates() {
        try {
            const r = await fetch('https://open.er-api.com/v6/latest/USD');
            if (!r.ok) return;
            const d = await r.json();
            if (d && d.rates) {
                rates = d.rates;
                liveRates = true;
                populateSelect();
            }
        } catch (e) {}
    }

    function setMode(m) {
        mode = m;
        document.getElementById('btn-foreign').classList.toggle('active', m === 'foreign');
        document.getElementById('btn-us').classList.toggle('active', m === 'us');
        const code = document.getElementById('currencySelect').value;
        if (m === 'foreign') {
            document.getElementById('inputLabel').textContent = `Price in ${code}`;
            document.getElementById('resultLabel').textContent = 'ESTIMATED USD PRICE';
            document.getElementById('outputUnitLabel').textContent = 'Show USD result in';
        } else {
            document.getElementById('inputLabel').textContent = 'Price in USD';
            document.getElementById('resultLabel').textContent = `ESTIMATED ${code} PRICE`;
            document.getElementById('outputUnitLabel').textContent = `Show ${code} result in`;
        }
        calc();
    }

    function updateRate() {
        const code = document.getElementById('currencySelect').value;
        const r = rates[code];
        const source = liveRates ? 'Live rates' : 'Built-in rates';
        document.getElementById('rateInfo').textContent = r
            ? `1 USD = ${r.toFixed(4)} ${code} · ${source}`
            : source;
        setMode(mode);
    }

    function calc() {
        const val = parseFloat(document.getElementById('inputVal').value);
        const inUnit = document.getElementById('inputUnit').value;
        const outUnit = document.getElementById('outputUnit').value;
        const code = document.getElementById('currencySelect').value;
        const rate = rates[code];
        const display = document.getElementById('resultValue');
        const unitSpan = document.getElementById('resultUnit');

        if (!val || !rate || isNaN(val)) {
            display.textContent = '—';
            return;
        }

        if (mode === 'foreign') {
            const foreignPerLiter = inUnit === 'liter' ? val : val / LPG;
            const usdPerLiter = foreignPerLiter / rate;
            const result = outUnit === 'gallon' ? usdPerLiter * LPG : usdPerLiter;
            display.textContent = '$' + result.toFixed(2);
            unitSpan.textContent = outUnit === 'gallon' ? 'per US gallon' : 'per liter';
        } else {
            const usdPerLiter = inUnit === 'gallon' ? val / LPG : val;
            const foreignPerLiter = usdPerLiter * rate;
            const result = outUnit === 'gallon' ? foreignPerLiter * LPG : foreignPerLiter;
            display.textContent = result.toFixed(2) + ' ' + code;
            unitSpan.textContent = outUnit === 'gallon' ? 'per gallon' : 'per liter';
        }
    }

    populateSelect();
    tryLiveRates();
</script>

</body>
</html>
